    description: "Domain types must exist"
  - path: "packages/shared/tsconfig.json"
    description: "TypeScript config must exist"
speculative_start_allowed: false

# Scope
scope:
  - "packages/shared/src/types/"
out_of_scope:
  - "apps/"
  - "harness/"
