    wave_id: wave-1
    milestone: M0a
    packet_class: foundation
    status: instantiated
    notes: Depends on F-M0-003 being merged before activation.
  - packet_id: F-M0-005
    manifest_ref: packets/manifests/F-M0-005.yaml
    wave_id: wave-1
